serverinfo {
	sid = "0AA";
	name = "me.test";
	description = "Test server";
	network_name = "Test network";
};

connect "remote.test" {
	host = "::1";
	fingerprint = "test";
	class = "default";
};

connect "remote2.test" {
	host = "::1";
	fingerprint = "test";
	class = "default";
};

connect "remote3.test" {
	host = "::1";
	fingerprint = "test";
	class = "default";
};

privset "admin" {
	privs = oper:general, oper:admin;
};

operator "admin" {
    user = "*@*";
    password = "test";
    flags = ~encrypted;
    privset = "admin";
};

class "lowq" {
    sendq = 8 kbytes;
};

/* not used by default, fake clients normally have no attached iline
 * needed to test async production via SAFELIST */
auth {
    user = "*@*";
    class = "lowq";
};
